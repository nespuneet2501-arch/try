name: Android CI Build & Test

on:
  push:
    branches: [ "main", "master", "developer" ]
  pull_request:
    branches: [ "main", "master", "developer" ]
  workflow_dispatch:

# Globally force JavaScript actions to run on Node.js 24 to suppress the Node 20 deprecation warnings
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    name: Build & Test Android App
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Codebase
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Grant Execute Permission to Gradle Wrapper (if present)
      run: |
        if [ -f gradlew ]; then
          chmod +x gradlew
        fi

    - name: Build with Gradle
      run: |
        if [ -f gradlew ]; then
          ./gradlew assembleDebug --no-daemon
        else
          gradle assembleDebug --no-daemon
        fi

    - name: Run Unit Tests
      run: |
        if [ -f gradlew ]; then
          ./gradlew testDebugUnitTest --no-daemon || echo "No tests or unit tests skipped"
        else
          gradle testDebugUnitTest --no-daemon || echo "No tests or unit tests skipped"
        fi

    - name: Archive Built Android Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: astro-app-debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk
        if-no-files-found: warn
